name: Deploy redirect stub to GitHub Pages

# The web app moved to https://cardmirror.app (Cloudflare Workers static
# assets, deployed by Cloudflare's Git integration on every push to main).
# GitHub Pages now serves only `web-redirect/`: a redirect page plus a
# self-destructing service worker that frees previously-installed PWAs
# from their old offline cache. Keep this deployed indefinitely — it's
# what old links and installed apps land on.

on:
  push:
    branches: [main]
    paths: ['web-redirect/**', '.github/workflows/deploy-pages.yml']
  # Allow a manual re-deploy from the Actions tab.
  workflow_dispatch:

# Single concurrent run; cancel in-progress deploys if a newer commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

# Permissions the actions/deploy-pages action requires.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy redirect stub
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-redirect

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
